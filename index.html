<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apple 设备店铺 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-wrap">
    <div class="phone" id="phoneApp">
      <header class="bbar">
        <div class="bbar-inner">
          <div class="logo">APPLE</div>
          <div class="btext">
            <div class="brow1">
              <span class="bname">Apple的体验店</span>
              <span class="bdot">·</span>
              <span class="bmeta">⭐4.9</span>
              <span class="bdot">·</span>
              <span class="bmeta">88万粉丝</span>
            </div>
            <div class="brow2">
              <span class="btag hi">官方旗舰店</span>
              <span class="btag">国行正品</span>
              <span class="btag">极速发货</span>
            </div>
          </div>
        </div>
      </header>

      <main class="canvas-stage" id="canvasStage">
        <section class="canvas-area" aria-label="canvas">
          <div class="conversation-stream" id="conversationStream"></div>
        </section>
      </main>

      <section class="detail-overlay" id="detailOverlay" aria-hidden="true">
        <div class="ov-top">
          <button class="ov-back-btn" id="detailCloseBtn" type="button" aria-label="返回">‹</button>
          <div class="ov-handle"></div>
          <div class="ov-top-spacer" aria-hidden="true"></div>
        </div>

        <div class="ov-scroll">
          <div class="prod-img" id="detailImage">
            <span id="detailImageLabel">商品图</span>
            <button class="detail-tryon-btn" id="detailAiBtn" type="button">AI 对比</button>
          </div>

          <div class="ov-body">
            <h3 class="prod-name" id="detailName">商品名称</h3>
            <div class="service-tags" aria-label="服务保障">
              <span class="service-tag">包邮</span>
              <span class="service-tag">7天无理由退换货</span>
              <span class="service-tag">正品保障</span>
              <span class="service-tag">极速退款</span>
            </div>

            <div class="anna-card">
              <div class="ac-h">
                <div class="ac-ava">A</div>
                <span class="ac-nm">anna 说</span>
                <span class="ac-lb">专属推荐</span>
              </div>
              <div class="ac-rec" id="detailInsight">我会基于 Apple 中国官网在售信息，为你解释参数并推荐更合适的机型。</div>
            </div>

            <div class="sec-t">参数速览</div>
            <div class="size-row" id="sizeRow">
              <span class="sz">芯片</span>
              <span class="sz rec">显示</span>
              <span class="sz">影像</span>
              <span class="sz">续航</span>
            </div>
            <div class="size-note" id="sizeNote">以下信息来自 Apple 中国官网公开技术规格。</div>

            <div class="sec-t">相关设备</div>
            <div class="bundle-list" id="bundleList"></div>
          </div>
        </div>

        <div class="buy-bar">
          <div class="buy-price-wrap">
            <span class="buy-price-main" id="buyPrice">¥0</span>
            <div class="buy-price-sub">
              <span class="buy-price-old" id="buyPriceOfficial">¥0</span>
              <span class="buy-price-badge" id="buyPriceBadge">店铺红包抵扣0元</span>
            </div>
          </div>
          <div class="buy-bar-inner">
            <button class="buy-btn add" type="button">加入购物车</button>
            <button class="buy-btn now" type="button">立即购买</button>
          </div>
        </div>

        <section class="detail-chat-view" id="detailChatView" aria-label="详情问答态">
          <div class="detail-chat-summary">
            <div class="detail-chat-thumb" id="detailChatThumb"></div>
            <div class="detail-chat-meta">
              <div class="detail-chat-name" id="detailChatName">商品名称</div>
              <div class="detail-chat-price" id="detailChatPrice">到手价 ¥0</div>
            </div>
            <div class="detail-chat-actions">
              <button class="mini-buy-btn add" type="button">加入购物车</button>
              <button class="mini-buy-btn now" type="button">立即购买</button>
            </div>
          </div>
          <div class="detail-chat-canvas">
            <div class="conversation-stream detail-chat-stream" id="detailChatStream"></div>
          </div>
        </section>
      </section>

      <section class="history-sheet" id="historySheet" aria-hidden="true">
        <div class="sheet-head">
          <span id="historyTitle">商品足迹</span>
          <button id="historyCloseBtn" class="ghost-btn" type="button">收起</button>
        </div>
        <div class="sheet-list" id="historyList"></div>
      </section>

      <footer class="bbot" id="assistantDock">
        <div class="chips-row" id="intentStrip"></div>
        <div class="input-row">
          <input id="intentInput" class="input-field" type="text" placeholder="anna 在线，可以问我任何问题" autocomplete="off">
          <button id="sendBtn" class="send-btn" type="button" aria-label="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
      </footer>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
