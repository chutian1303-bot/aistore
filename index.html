<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>JNBY · AI 导购</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1a1a;--ink2:#444;--ink-light:#888;--ink-faint:#bbb;
  --paper:#faf9f6;--warm:#f5f0e8;--warm2:#ede8de;
  --border:#e8e4dc;--green:#2a7a5a;--orange:#FF5000;--gold:#FFB400;
  --radius:10px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#f0ede6;font-family:'Noto Sans SC',sans-serif;color:var(--ink);overscroll-behavior:none}

/* ── App shell ── */
#app{
  max-width:430px;margin:0 auto;
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  background:var(--paper);
  position:relative;overflow:hidden;
}

/* ── Status bar ── */
#status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 18px 4px;font-size:12px;font-weight:600;
  background:var(--paper);flex-shrink:0;
}

/* ── Brand bar ── */
#brand-bar{
  background:var(--paper);border-bottom:1px solid var(--border);
  flex-shrink:0;
  transition:max-height .3s ease,opacity .28s ease;
  max-height:80px;overflow:hidden;
}
#brand-bar.hidden{max-height:0;opacity:0}
#brand-bar.hidden + #compact-bar{display:flex}
.bb-inner{display:flex;align-items:center;gap:10px;padding:6px 14px 8px}
.bb-logo{
  width:36px;height:36px;flex-shrink:0;background:var(--ink);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:800;color:#fff;letter-spacing:.4px;
}
.bb-text{flex:1;min-width:0}
.bb-row1{display:flex;align-items:baseline;gap:4px;margin-bottom:3px}
.bb-name{font-size:12px;font-weight:700}
.bb-meta{font-size:7.5px;color:var(--ink-light);white-space:nowrap}
.bb-dot{font-size:7.5px;color:#d0cbc4}
.bb-row2{display:flex;gap:4px;flex-wrap:nowrap;overflow:hidden}
.bb-tag{font-size:7px;font-weight:600;padding:1px 6px;border-radius:7px;border:1px solid var(--border);color:var(--ink-light);background:var(--warm);white-space:nowrap}
.bb-tag.hi{color:#2a5aa0;border-color:#c0d0e8;background:#eef3fb}

/* ── Compact bar ── */
#compact-bar{
  display:none;align-items:center;gap:9px;
  padding:9px 14px;background:var(--paper);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.cb-logo{width:26px;height:26px;flex-shrink:0;background:var(--ink);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:5.5px;font-weight:800;color:#fff}
.cb-texts{flex:1;min-width:0}
.cb-name{font-size:11px;font-weight:700;margin-bottom:1px}
.cb-sub{font-size:9px;color:var(--ink-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Reply subtitle ── */
#reply-sub{
  display:none;padding:5px 14px 6px;
  font-size:10px;color:var(--ink-light);
  background:var(--paper);
}

/* ── Main scroll ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{width:0}

/* ── Welcome zone ── */
#welcome-zone{padding:14px 14px 8px}
.anna-text{font-size:13px;line-height:1.8;color:var(--ink)}
.anna-text .hi{color:var(--orange);font-weight:600}

/* ── Feed grid ── */
.feed-section{padding:0 10px 10px}
.feed-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.product-card{
  background:#fff;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;
  transition:opacity .15s;
}
.product-card:active{opacity:.75}
.pc-img{
  width:100%;aspect-ratio:3/4;
  object-fit:cover;display:block;
  background:var(--warm2);
}
.pc-img-placeholder{
  width:100%;aspect-ratio:3/4;
  background:var(--warm2);display:flex;
  align-items:center;justify-content:center;
  font-size:11px;color:var(--ink-faint);
}
.pc-body{padding:8px 9px 10px}
.pc-tag{font-size:8px;color:var(--green);margin-bottom:2px}
.pc-name{font-size:10px;font-weight:600;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-price{font-size:11px;font-weight:700}
.pc-sold{font-size:8px;color:var(--ink-faint);margin-left:4px}
.pc-badge{
  position:absolute;top:6px;left:6px;
  font-size:7px;font-weight:700;color:#fff;
  padding:2px 5px;border-radius:3px;
}
.pc-badge.new{background:var(--ink)}
.pc-badge.pre{background:#c0392b}
.pc-wrap{position:relative}

/* ── Chat canvas ── */
#chat-canvas{padding:8px 14px 0}
.msg-user{display:flex;justify-content:flex-end;margin-bottom:10px}
.msg-user-bubble{
  background:var(--ink);color:#fff;
  border-radius:14px 14px 3px 14px;
  padding:8px 12px;font-size:12px;line-height:1.5;
  max-width:78%;
}
.msg-anna{margin-bottom:12px}
.msg-anna-text{font-size:12px;line-height:1.75;color:var(--ink);margin-bottom:8px}
.msg-anna-feeds{margin:0 -14px;padding:0 10px}
.msg-anna-feeds .feed-grid{gap:6px}
.msg-anna-feeds .product-card .pc-body{padding:6px 7px 8px}
.msg-anna-feeds .pc-name{font-size:9px}
.msg-anna-feeds .pc-price{font-size:10px}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 0 8px}
.typing-dot{
  width:7px;height:7px;border-radius:50%;background:var(--ink-faint);
  animation:bounce .9s ease infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── Detail overlay ── */
#detail-overlay{
  position:absolute;left:0;right:0;
  top:0;bottom:0;
  background:var(--paper);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  z-index:50;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#detail-overlay.open{transform:translateY(0)}
#detail-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:52px 16px 10px;
  background:var(--paper);flex-shrink:0;
}
#detail-back{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.9);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ink);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
#detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#detail-scroll::-webkit-scrollbar{width:0}
.detail-img-wrap{position:relative}
.detail-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--warm2)}
.detail-img-placeholder{width:100%;aspect-ratio:3/4;background:var(--warm2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink-faint)}
.detail-tryon{
  position:absolute;bottom:12px;right:12px;
  background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);
  border-radius:20px;padding:5px 12px;
  font-size:10px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.detail-img-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.img-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
.img-dot.on{background:#fff;width:14px;border-radius:3px}
.detail-body{padding:14px 16px}
.detail-name{font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.detail-meta{font-size:9px;color:var(--ink-light);font-weight:400}
.detail-colors{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.color-tag{font-size:8px;padding:2px 8px;border-radius:6px;border:1px solid var(--border);color:var(--ink-light);background:#fff}
.anna-rec-card{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:12px;
}
.arc-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.arc-ava{width:20px;height:20px;border-radius:50%;background:var(--warm2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:6px;color:var(--ink-light);flex-shrink:0}
.arc-name{font-size:10px;font-weight:700}
.arc-lbl{font-size:8px;color:var(--ink-light);margin-left:auto}
.arc-text{font-size:10px;line-height:1.7;color:var(--ink)}
.arc-hi{color:var(--orange);font-weight:600}
.sec-title{font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px;margin-bottom:8px}
.sec-title::before{content:'';width:3px;height:11px;background:var(--ink);border-radius:2px;display:inline-block;flex-shrink:0}
.size-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.sz-chip{
  font-size:11px;font-weight:600;padding:5px 14px;
  border-radius:7px;border:1px solid var(--border);
  color:var(--ink-light);background:#fff;cursor:pointer;
  transition:border-color .15s;
}
.sz-chip.rec{border-color:var(--ink);color:var(--ink);position:relative}
.sz-chip.rec::after{
  content:'推荐';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  font-size:7px;font-weight:700;color:var(--orange);
  background:var(--paper);padding:0 3px;white-space:nowrap;
}
.sz-chip.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.size-note{font-size:9px;color:var(--ink-light);line-height:1.55;margin-bottom:14px}
.outfit-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin:0 -16px;padding:0 16px 6px}
.outfit-scroll::-webkit-scrollbar{height:0}
.outfit-item{flex-shrink:0;width:80px;cursor:pointer}
.outfit-img{width:80px;height:100px;border-radius:8px;object-fit:cover;background:var(--warm2);border:1px solid var(--border);margin-bottom:4px;display:block}
.outfit-name{font-size:8px;font-weight:600;line-height:1.3;margin-bottom:1px}
.outfit-price{font-size:9px;font-weight:700}
#detail-buy{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px calc(10px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:var(--paper);flex-shrink:0;
}
.buy-price-main{font-size:18px;font-weight:700;line-height:1}
.buy-price-sub{display:flex;align-items:center;gap:5px;margin-top:3px}
.buy-price-old{font-size:9px;color:var(--ink-faint);text-decoration:line-through}
.buy-price-badge{font-size:8px;font-weight:700;color:var(--orange);border:1px solid var(--orange);border-radius:4px;padding:0 4px;line-height:1.5}
.buy-btns{display:flex;border-radius:10px;overflow:hidden;height:36px;flex-shrink:0}
.buy-btn{width:80px;border:none;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff}
.buy-btn.add{background:var(--gold)}
.buy-btn.now{background:var(--orange)}

/* ── Panels ── */
#panel-overlay{
  position:absolute;left:0;right:0;
  bottom:0;z-index:40;
  background:var(--paper);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .3s ease;
  max-height:60%;
  display:flex;flex-direction:column;
}
#panel-overlay.open{transform:translateY(0)}
.panel-handle{width:32px;height:3px;background:#ddd;border-radius:2px;margin:10px auto 0}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.panel-title{font-size:13px;font-weight:700}
.panel-count{font-size:10px;color:var(--ink-faint)}
.panel-scroll{flex:1;overflow-y:auto}
.panel-scroll::-webkit-scrollbar{width:0}
.panel-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.panel-item:last-child{border-bottom:none}
.panel-item:active{background:var(--warm)}
.pi-thumb{width:38px;height:50px;border-radius:7px;object-fit:cover;background:var(--warm2);border:1px solid var(--border);flex-shrink:0}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:11px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-price{font-size:11px;font-weight:700}
.pi-time{font-size:8px;color:var(--ink-faint);margin-top:1px}
.pi-q{font-size:11px;font-weight:500;line-height:1.4;margin-bottom:3px}
.pi-meta{display:flex;align-items:center;gap:6px}
.pi-tag{font-size:8px;font-weight:600;padding:1px 7px;border-radius:8px;background:var(--warm);border:1px solid var(--border);color:var(--ink-light)}
.pi-tag.r{color:var(--green);background:#eef7f3;border-color:#c0ddd0}
.pi-arrow{font-size:14px;color:var(--ink-faint);flex-shrink:0}
.pi-empty{text-align:center;padding:32px 16px;font-size:12px;color:var(--ink-faint)}

/* ── Scrim ── */
#scrim{
  position:absolute;inset:0;background:rgba(0,0,0,.32);
  z-index:35;opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#scrim.show{opacity:1;pointer-events:auto}

/* ── Bottom bar ── */
#bottom-bar{
  background:var(--paper);border-top:1px solid var(--border);
  flex-shrink:0;padding:6px 12px calc(8px + var(--safe-bottom));
  transition:transform .3s ease;
}
.chips-row{display:flex;gap:5px;overflow-x:auto;margin-bottom:7px;padding-top:6px;overflow-y:visible}
.chips-row::-webkit-scrollbar{height:0}
.chip{
  flex-shrink:0;font-size:9px;font-weight:600;
  padding:5px 11px;border-radius:14px;
  border:1px solid var(--border);background:#fff;color:var(--ink);
  white-space:nowrap;cursor:pointer;position:relative;
  transition:background .15s;
}
.chip:active{background:var(--warm)}
.chip.foot{background:var(--warm)}
.chip.msg{background:var(--warm2)}
.chip-badge{
  position:absolute;top:-5px;right:-5px;
  background:var(--orange);color:#fff;
  font-size:7px;font-weight:800;
  min-width:14px;height:14px;border-radius:7px;
  display:inline-flex;align-items:center;justify-content:center;
  padding:0 3px;
}
.input-row{display:flex;align-items:center;gap:8px}
#input-field{
  flex:1;background:#fff;border:1px solid var(--border);
  border-radius:20px;padding:10px 16px;
  font-size:12px;color:var(--ink);font-family:inherit;
  outline:none;
  transition:border-color .2s;
}
#input-field:focus{border-color:var(--ink)}
#input-field::placeholder{color:var(--ink-faint)}
#send-btn{
  width:34px;height:34px;background:var(--ink);
  border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
#send-btn:active{transform:scale(.9)}
#send-btn svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── Toast ── */
#toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;
  padding:7px 16px;border-radius:20px;font-size:12px;
  z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- Status bar -->
  <div id="status-bar">
    <span id="clock">10:32</span>
    <span>5G ▌▌</span>
  </div>

  <!-- Brand bar -->
  <div id="brand-bar">
    <div class="bb-inner">
      <div class="bb-logo">JNBY</div>
      <div class="bb-text">
        <div class="bb-row1">
          <span class="bb-name">JNBY 江南布衣旗舰店</span>
          <span class="bb-dot">·</span><span class="bb-meta">⭐ 4.8</span>
          <span class="bb-dot">·</span><span class="bb-meta">62.3万粉丝</span>
        </div>
        <div class="bb-row2">
          <span class="bb-tag hi">官方旗舰店</span>
          <span class="bb-tag">品牌设计师</span>
          <span class="bb-tag">白领精选</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Compact bar -->
  <div id="compact-bar">
    <div class="cb-logo">JNBY</div>
    <div class="cb-texts">
      <div class="cb-name">JNBY 江南布衣旗舰店</div>
      <div class="cb-sub" id="compact-sub">anna 已为你整理好了 28 款新品</div>
    </div>
  </div>

  <!-- Reply sub -->
  <div id="reply-sub"></div>

  <!-- Main scroll -->
  <div id="main">

    <!-- Welcome zone -->
    <div id="welcome-zone">
      <div class="anna-text">hi 王同学，欢迎进店，我是你的专属店铺导购 anna。本店最近上新了 <span class="hi">28 款新品</span>，结合你平时的穿衣风格，已经为你整理好了。</div>
    </div>

    <!-- Chat canvas (conversation) -->
    <div id="chat-canvas"></div>

    <!-- Feed section -->
    <div class="feed-section">
      <div class="feed-grid" id="feed-grid"></div>
    </div>

  </div>

  <!-- Detail overlay -->
  <div id="detail-overlay">
    <div id="detail-header">
      <div id="detail-back" onclick="closeDetail()">←</div>
    </div>
    <div id="detail-scroll">
      <div class="detail-img-wrap">
        <div class="detail-img-placeholder" id="detail-img-ph">商品图片</div>
        <img class="detail-img" id="detail-img" src="" style="display:none" onload="this.style.display='block';document.getElementById('detail-img-ph').style.display='none'" onerror="this.style.display='none'">
        <div class="detail-tryon">✦ AI 试衣</div>
        <div class="detail-img-dots">
          <div class="img-dot on"></div><div class="img-dot"></div><div class="img-dot"></div>
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-name" id="d-name">
          商品名称 <span class="detail-meta" id="d-meta"></span>
        </div>
        <div class="detail-colors" id="d-colors"></div>
        <div class="anna-rec-card">
          <div class="arc-header">
            <div class="arc-ava">头像</div>
            <span class="arc-name">anna 说</span>
            <span class="arc-lbl">专属推荐</span>
          </div>
          <div class="arc-text" id="d-anna-note">
            这件很适合你平时的穿衣风格。
          </div>
        </div>
        <div class="sec-title">尺码推荐</div>
        <div class="size-row" id="d-sizes"></div>
        <div class="size-note" id="d-size-note">根据你的历史购买记录，建议选 S 码，版型略宽松，穿起来有余量。</div>
        <div class="sec-title">搭配建议</div>
        <div class="outfit-scroll" id="d-outfit"></div>
      </div>
    </div>
    <div id="detail-buy">
      <div>
        <div class="buy-price-main" id="d-price">¥0</div>
        <div class="buy-price-sub" id="d-price-sub"></div>
      </div>
      <div class="buy-btns">
        <button class="buy-btn add" onclick="showToast('已加入购物车 🛒')">加入购物车</button>
        <button class="buy-btn now" onclick="showToast('正在跳转结算…')">立即购买</button>
      </div>
    </div>
  </div>

  <!-- Panel overlay (footprint / history) -->
  <div id="panel-overlay">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <span class="panel-title" id="panel-title">商品足迹</span>
      <span class="panel-count" id="panel-count"></span>
    </div>
    <div class="panel-scroll" id="panel-scroll"></div>
  </div>

  <!-- Scrim -->
  <div id="scrim" onclick="closePanel()"></div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div class="chips-row" id="chips-row">
      <div class="chip foot" onclick="openPanel('foot')">👣 商品足迹<span class="chip-badge" id="foot-badge" style="display:none">0</span></div>
      <div class="chip msg" onclick="openPanel('history')">💬 历史消息</div>
      <div class="chip" onclick="fillInput('帮我找适合通勤的外套')">找外套</div>

// ────────────────────────────────────────────────
// MINIMAX API
// ────────────────────────────────────────────────
async function callMinimax(userText) {
  const messages = [
    { role: 'system', content: buildSystemPrompt() },
    ...state.chatMessages,
    { role: 'user', content: userText },
  ];

  const body = JSON.stringify({
    model: 'abab6.5s-chat',
    messages,
    max_tokens: 300,
    temperature: 0.7,
  });

  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${MINIMAX_KEY}`,
  };

  // Try direct first, then CORS proxy
  for (const url of [MINIMAX_URL, PROXY_URL]) {
    try {
      const res = await fetch(url, { method: 'POST', headers, body });
      if (!res.ok) continue;
      const data = await res.json();
      const content = data.choices?.[0]?.message?.content;
      if (content) return content;
    } catch (e) { continue; }
  }

  // Fallback: scripted responses
  return fallbackResponse(userText);
}

function fallbackResponse(text) {
  const t = text.toLowerCase();
  if (t.includes('风衣') || t.includes('外套') || t.includes('大衣')) {
    return '给你找了几件本季外套，都是 JNBY 经典廓形剪裁，很适合你的风格～\n[IDS:1,2,5,8]';
  }
  if (t.includes('裤') || t.includes('下装')) {
    return '这几条裤子都很百搭，锥形和阔腿是今季最流行的版型 👇\n[IDS:3,9,12]';
  }
  if (t.includes('连衣裙') || t.includes('裙')) {
    return '这两件连衣裙设计感都很强，是本季新品，一件通勤一件日常 ✨\n[IDS:6,7]';
  }
  if (t.includes('搭配') || t.includes('穿搭')) {
    return '推荐一套经典 JNBY 穿搭：薄风衣 + 锥形裤，干净利落，任何场合都适合 👇\n[IDS:8,3,9]';
  }
  if (t.includes('优惠') || t.includes('折扣') || t.includes('便宜')) {
    return 'LESS 系列现在有 8 折优惠，包括立领夹克、锥形裤、薄风衣，性价比很高 ～\n[IDS:2,3,8]';
  }
  if (t.includes('尺码') || t.includes('尺寸')) {
    return '根据你平时的购买记录，建议选 S 码。JNBY 版型偏宽松，S 码穿起来有余量不会紧。';
  }
  if (t.includes('针织') || t.includes('毛衣')) {
    return '这件燕麦色针织开衫很适合春秋叠穿，材质是羊毛混纺，软糯好穿 ✨\n[IDS:4]';
  }
  if (t.includes('新品') || t.includes('上新')) {
    return '本周上新了 28 款，给你推荐几件最值得关注的新品 👇\n[IDS:5,6,8,11]';
  }
  if (t.includes('试衣')) {
    return 'AI 试衣功能可以在商品详情页右下角找到，点击「✦ AI 试衣」即可上传照片试穿效果～';
  }
  return '你说的这个我需要了解更多，你可以告诉我是什么场合穿，或者喜欢什么风格？我来帮你找更准确的 😊';
}

function parseAnnaResponse(text) {
  const match = text.match(/\[IDS:([\d,\s]+)\]/);
  let productIds = [];
  if (match) {
    productIds = match[1].split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
  }
  const cleanText = text.replace(/\[IDS:[\d,\s]+\]/g, '').trim();
  return { text: cleanText, productIds };
}

async function sendMessage() {
  const input = document.getElementById('input-field');
  const text = input.value.trim();
  if (!text || state.isLoading) return;
  input.value = '';
  input.blur();
  await handleQuery(text);
}

async function handleQuery(text) {
  if (state.isLoading) return;
  state.isLoading = true;
  state.inChatMode = true;

  const canvas = document.getElementById('chat-canvas');

  // Append user message
  const userEl = document.createElement('div');
  userEl.className = 'msg-user';
  userEl.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
  canvas.appendChild(userEl);

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  canvas.appendChild(typingEl);

  scrollToBottom();

  // Call API
  let response;
  try {
    response = await callMinimax(text);
  } catch (e) {
    response = fallbackResponse(text);
  }

  const { text: annaText, productIds } = parseAnnaResponse(response);

  // Remove typing
  canvas.removeChild(typingEl);

  // Append anna response
  const annaEl = document.createElement('div');
  annaEl.className = 'msg-anna';
  annaEl.innerHTML = `
    <div class="msg-anna-text">${escHtml(annaText)}</div>
    ${renderAnnaProductCards(productIds)}
  `;
  canvas.appendChild(annaEl);

  // Update conversation context
  state.chatMessages.push({ role: 'user', content: text });
  state.chatMessages.push({ role: 'assistant', content: response });

  // Add to history
  const recProds = productIds.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
  state.history.unshift({
    q: text,
    a: annaText,
    products: recProds,
    time: nowTime(),
  });

  // Update reply-sub and compact-sub
  if (productIds.length > 0) {
    const names = recProds.slice(0, 2).map(p => p.name).join('、');
    document.getElementById('reply-sub').textContent = `anna 推荐了：${names}`;
    document.getElementById('compact-sub').textContent = `anna：${annaText.slice(0, 20)}…`;
  }

  scrollToBottom();
  state.isLoading = false;
}

function fillInput(text) {
  const input = document.getElementById('input-field');
  input.value = text;
  input.focus();
}

function scrollToBottom() {
  const main = document.getElementById('main');
  main.scrollTop = main.scrollHeight;
}

  }

  // Outfit
  const outfitEl = document.getElementById('d-outfit');
  const matchProds = p.matchIds.map(id => PRODUCTS.find(x => x.id === id)).filter(Boolean);
  outfitEl.innerHTML = [p, ...matchProds].slice(0, 4).map((mp, i) => `
    <div class="outfit-item" onclick="openDetail(${mp.id})">
      <img class="outfit-img" src="${mp.img}" alt="${mp.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="outfit-name">${i === 0 ? '本款' : mp.name}</div>
      <div class="outfit-price">${i === 0 ? '已选' : '¥' + mp.price.toLocaleString()}</div>
    </div>
  `).join('');

  // Open overlay
  document.getElementById('detail-overlay').classList.add('open');

  // Add to footprint
  if (!state.footprint.find(f => f.product.id === p.id)) {
    state.footprint.unshift({ product: p, time: nowTime() });
    updateFootBadge();
  }
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  state.currentProduct = null;

  // Show reply-sub after returning if there's context
  if (state.history.length > 0) {
    const replySub = document.getElementById('reply-sub');
    replySub.style.display = 'block';
  }
}

function selectSize(el) {
  document.querySelectorAll('.sz-chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  el.classList.remove('rec');
}

// ────────────────────────────────────────────────
// PANELS
// ────────────────────────────────────────────────
function openPanel(type) {
  state.currentPanel = type;
  const panel = document.getElementById('panel-overlay');
  const scroll = document.getElementById('panel-scroll');
  const title = document.getElementById('panel-title');
  const count = document.getElementById('panel-count');

  if (type === 'foot') {
    title.textContent = '商品足迹';
    if (!state.footprint.length) {
      count.textContent = '';
      scroll.innerHTML = '<div class="pi-empty">还没有浏览记录，快去逛逛吧 ～</div>';
    } else {
      count.textContent = `最近浏览 ${state.footprint.length} 件`;
      scroll.innerHTML = state.footprint.map(f => `
        <div class="panel-item" onclick="openDetail(${f.product.id});closePanel()">
          <img class="pi-thumb" src="${f.product.img}" alt="${f.product.name}" onerror="this.style.display='none'">
          <div class="pi-info">
            <div class="pi-name">${f.product.name}</div>
            <div class="pi-price">¥${f.product.price.toLocaleString()}</div>
            <div class="pi-time">${f.time} 浏览</div>
          </div>
          <div class="pi-arrow">›</div>
        </div>
      `).join('');
    }
  } else {
    title.textContent = '历史消息';
    if (!state.history.length) {
      count.textContent = '';
      scroll.innerHTML = '<div class="pi-empty">还没有问过 anna，试着问点什么吧 ～</div>';
    } else {
      count.textContent = `共 ${state.history.length} 条`;
      scroll.innerHTML = state.history.map((h, i) => `
        <div class="panel-item" onclick="jumpToHistory(${i})">
          <div class="pi-info">
            <div class="pi-q">${escHtml(h.q)}</div>
            <div class="pi-meta">
              <span class="pi-time">${h.time}</span>
              ${h.products.length ? `<span class="pi-tag r">推荐了 ${h.products.length} 个商品</span>` : '<span class="pi-tag">anna 已回复</span>'}
            </div>
          </div>
          <div class="pi-arrow">›</div>
        </div>
      `).join('');
    }
  }

  panel.classList.add('open');
  document.getElementById('scrim').classList.add('show');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
  state.currentPanel = null;
}

function jumpToHistory(idx) {
  closePanel();
  // Scroll to that message in canvas
  const canvas = document.getElementById('chat-canvas');
  const userMsgs = canvas.querySelectorAll('.msg-user');
  const targetIdx = state.history.length - 1 - idx;
  if (userMsgs[targetIdx]) {
    userMsgs[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateFootBadge() {
  const badge = document.getElementById('foot-badge');
  if (state.footprint.length > 0) {
    badge.style.display = 'inline-flex';
    badge.textContent = state.footprint.length;
  }
}

// ────────────────────────────────────────────────
// SCROLL BEHAVIOR
// ────────────────────────────────────────────────
function initScroll() {
  const main = document.getElementById('main');
  const brandBar = document.getElementById('brand-bar');
  const compactBar = document.getElementById('compact-bar');
  const replySub = document.getElementById('reply-sub');
  let lastY = 0, timer = null, hidden = false;

  function hide() {
    if (hidden) return; hidden = true;
    brandBar.classList.add('hidden');
    if (state.history.length) replySub.style.display = 'block';
  }
  function show() {
    if (!hidden) return; hidden = false;
    brandBar.classList.remove('hidden');
  }

  main.addEventListener('scroll', () => {
    const y = main.scrollTop;
    if (y <= 20) { show(); lastY = y; return; }
    if (Math.abs(y - lastY) > 4) hide();
    lastY = y;
    clearTimeout(timer);
    timer = setTimeout(show, 1000);
  });
}

// ────────────────────────────────────────────────
// UTILS
// ────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nowTime() {
  const now = new Date();
  return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateClock() {
  document.getElementById('clock').textContent = nowTime();
  setTimeout(updateClock, 30000);
}

// ────────────────────────────────────────────────
// INPUT HANDLING
// ────────────────────────────────────────────────
function initInput() {
  const input = document.getElementById('input-field');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────
function init() {
  updateClock();
  renderFeed();
  initScroll();
  initInput();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
